cubes:
  - name: orders
    sql_table: ECOM_NEW.ORDERS

    dimensions:
      - name: order_id
        sql: ORDER_ID
        type: number
        primary_key: true

      - name: user_id
        sql: USER_ID
        type: number

      - name: status
        sql: STATUS
        type: string

      - name: gender
        sql: GENDER
        type: string

      - name: num_of_item
        sql: NUM_OF_ITEM
        type: number

      - name: returned_at
        sql: RETURNED_AT
        type: string

      - name: created_at
        sql: CREATED_AT
        type: time

      - name: delivered_at
        sql: DELIVERED_AT
        type: time

      - name: shipped_at
        sql: SHIPPED_AT
        type: time

    measures:
      - name: count
        type: count
