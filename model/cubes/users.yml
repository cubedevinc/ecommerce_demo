cubes:
  - name: users
    sql_table: ECOM_NEW.USERS

    dimensions:
      - name: id
        sql: ID
        type: number
        primary_key: true

      - name: first_name
        sql: FIRST_NAME
        type: string

      - name: last_name
        sql: LAST_NAME
        type: string

      - name: full_name
        sql: "CONCAT({first_name}, ' ', {last_name})"
        type: string

      - name: email
        sql: EMAIL
        type: string

      - name: age
        sql: AGE
        type: number

      - name: gender
        sql: GENDER
        type: string

      - name: street_address
        sql: STREET_ADDRESS
        type: string

      - name: city
        sql: CITY
        type: string

      - name: state
        sql: STATE
        type: string

      - name: country
        sql: COUNTRY
        type: string

      - name: postal_code
        sql: POSTAL_CODE
        type: string

      - name: latitude
        sql: LATITUDE
        type: number

      - name: longitude
        sql: LONGITUDE
        type: number

      - name: traffic_source
        sql: TRAFFIC_SOURCE
        type: string

      - name: created_at
        sql: CREATED_AT
        type: time

    measures:
      - name: count
        type: count
