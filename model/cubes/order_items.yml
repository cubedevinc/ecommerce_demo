cubes:
  - name: order_items
    sql_table: ECOMMERCE.ORDER_ITEMS
    description: Order items in the e-commerce platform

    joins:
      - name: orders
        sql: "{CUBE.order_id} = {orders.order_id}"
        relationship: many_to_one

      - name: products
        sql: "{CUBE.product_id} = {products.id}"
        relationship: many_to_one

      - name: users
        sql: "{CUBE.user_id} = {users.id}"
        relationship: many_to_one

      - name: inventory_items
        sql: "{CUBE.inventory_item_id} = {inventory_items.id}"
        relationship: many_to_one

    dimensions:
      - name: id
        sql: "{CUBE}.ID"
        type: number
        primary_key: true

      - name: order_id
        sql: "{CUBE}.ORDER_ID"
        type: number

      - name: user_id
        sql: "{CUBE}.USER_ID"
        type: number

      - name: product_id
        sql: "{CUBE}.PRODUCT_ID"
        type: number

      - name: inventory_item_id
        sql: "{CUBE}.INVENTORY_ITEM_ID"
        type: number

      - name: status
        sql: STATUS
        type: string

      - name: sale_price
        sql: SALE_PRICE
        type: number

      - name: created_at
        sql: CREATED_AT
        type: time

      - name: shipped_at
        sql: SHIPPED_AT
        type: time

      - name: delivered_at
        sql: DELIVERED_AT
        type: time

      - name: returned_at
        sql: RETURNED_AT
        type: time

      - name: is_delivered
        sql: "({CUBE}.DELIVERED_AT IS NOT NULL)"
        type: boolean
        description: "Indicates whether the item has been delivered"

    measures:
      - name: count
        type: count

      - name: order_count
        type: count_distinct
        sql: order_id
        drill_members:
          - orders.num_of_item
          - orders.status

      - name: total_sale_price
        type: sum
        sql: sale_price
        format: currency
        description: "We use this when look at revenue"

    pre_aggregations:
      - name: orders_transactions_rollup
        measures:
          - count
          - order_count
          - total_sale_price
        dimensions:
          - status
        time_dimension: created_at
        granularity: day
